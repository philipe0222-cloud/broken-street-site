<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Worldbook oficial do universo Broken Street.">
  <title>Worldbook | Broken Street</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050208;
      --accent: #b026ff;
      --accent-dim: rgba(176, 38, 255, 0.25);
      --accent-glow: rgba(176, 38, 255, 0.4);
      --card-bg: rgba(15, 8, 25, 0.8);
      --text-main: #d1c9e8;
      --text-muted: #9985bb;
      --text-dim: #666;
      --sidebar-w: 260px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: rgba(176, 38, 255, 0.3); }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(176, 38, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(176, 38, 255, 0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridDriftWb 48s linear infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes gridDriftWb {
      from { background-position: 0 0, 0 0; }
      to { background-position: 60px 60px, 60px 60px; }
    }

    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.06) 2px,
        rgba(0, 0, 0, 0.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 32px;
      background: rgba(5, 2, 8, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(176, 38, 255, 0.15);
    }

    .top-nav-left {
      display: flex;
      align-items: center;
      gap: 20px;
      min-width: 0;
    }

    .nav-back {
      color: var(--text-muted);
      text-decoration: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .nav-back:hover { color: var(--accent); }

    .nav-sep {
      width: 1px;
      height: 16px;
      background: rgba(176, 38, 255, 0.2);
    }

    .nav-title-wk {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--accent);
    }

    .nav-search {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(176, 38, 255, 0.05);
      border: 1px solid rgba(176, 38, 255, 0.15);
      padding: 6px 14px;
    }

    .nav-search input {
      width: 220px;
      background: none;
      border: none;
      outline: none;
      color: var(--text-main);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
    }

    .nav-search input::placeholder { color: var(--text-dim); }
    .nav-search-icon { color: var(--text-dim); font-size: 0.75rem; }

    .wb-layout {
      display: flex;
      padding-top: 52px;
      min-height: 100vh;
    }

    .wb-sidebar {
      position: fixed;
      top: 52px;
      left: 0;
      bottom: 0;
      width: var(--sidebar-w);
      overflow-y: auto;
      background: rgba(8, 4, 14, 0.95);
      border-right: 1px solid rgba(176, 38, 255, 0.1);
      z-index: 100;
      padding: 28px 0 40px;
    }

    .wb-sidebar::-webkit-scrollbar { width: 2px; }
    .wb-sidebar::-webkit-scrollbar-thumb { background: rgba(176, 38, 255, 0.2); }

    .sidebar-section-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      color: var(--accent);
      opacity: 0.5;
      padding: 0 20px;
      margin: 20px 0 8px;
      text-transform: uppercase;
    }

    .sidebar-section-title:first-child { margin-top: 0; }

    .sidebar-link {
      display: block;
      width: 100%;
      padding: 8px 20px;
      color: var(--text-muted);
      font-family: 'Exo 2', sans-serif;
      font-size: 0.78rem;
      text-align: left;
      text-decoration: none;
      background: transparent;
      border: 0;
      border-left: 2px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
    }

    .sidebar-link:hover {
      color: var(--text-main);
      background: rgba(176, 38, 255, 0.05);
      border-left-color: rgba(176, 38, 255, 0.3);
    }

    .sidebar-link.active {
      color: var(--accent);
      background: rgba(176, 38, 255, 0.07);
      border-left-color: var(--accent);
    }

    .wb-main {
      width: min(100%, 980px);
      margin-left: var(--sidebar-w);
      padding: 60px 72px 100px;
      position: relative;
      z-index: 1;
    }

    .wb-hero { margin-bottom: 72px; }

    .wb-hero-tag {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      opacity: 0.6;
    }

    .wb-hero-tag::before,
    .wb-hero-tag::after {
      content: '';
      width: 30px;
      height: 1px;
      background: var(--accent);
      opacity: 0.4;
    }

    .wb-hero-title {
      margin-bottom: 20px;
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .wb-hero-desc {
      max-width: 680px;
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.7;
      opacity: 0.85;
    }

    .mobile-page-nav {
      display: none;
      width: 100%;
      margin-top: 24px;
      padding: 11px 12px;
      color: var(--text-main);
      background: rgba(15, 8, 25, 0.95);
      border: 1px solid rgba(176, 38, 255, 0.25);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
    }

    .wb-article { display: none; }

    .wb-article.visible {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .article-header {
      margin-bottom: 30px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(176, 38, 255, 0.1);
    }

    .article-category {
      margin-bottom: 12px;
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    .article-title {
      margin-bottom: 16px;
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 900;
      line-height: 1.1;
    }

    .article-lead {
      max-width: 720px;
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.75;
      opacity: 0.9;
    }

    .article-body h3,
    .gallery-heading {
      margin: 40px 0 16px;
      color: var(--accent);
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .article-body h4 {
      margin: 24px 0 10px;
      color: #c88dff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .article-body p {
      margin-bottom: 16px;
      color: var(--text-main);
      font-size: 0.98rem;
      line-height: 1.8;
      opacity: 0.82;
    }

    .article-body ul {
      list-style: none;
      margin: 0 0 20px;
      padding: 0;
    }

    .article-body li {
      position: relative;
      padding: 8px 0 8px 20px;
      color: var(--text-main);
      font-size: 0.95rem;
      line-height: 1.6;
      border-bottom: 1px solid rgba(176, 38, 255, 0.06);
      opacity: 0.8;
    }

    .article-body li::before {
      content: '//';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      opacity: 0.5;
    }

    .table-wrap {
      overflow-x: auto;
      margin: 24px 0;
    }

    .info-table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
    }

    .info-table th,
    .info-table td {
      padding: 11px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(176, 38, 255, 0.08);
      font-size: 0.88rem;
      line-height: 1.55;
    }

    .info-table th {
      color: var(--accent);
      background: rgba(176, 38, 255, 0.05);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .info-table td:first-child {
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.78;
    }

    .highlight-quote {
      margin: 24px 0;
      padding: 16px 24px;
      background: rgba(176, 38, 255, 0.04);
      border-left: 2px solid var(--accent);
    }

    .highlight-quote p {
      margin: 0;
      color: var(--text-muted);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-style: italic;
      opacity: 1;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 20px 0;
    }

    .tag-pill {
      padding: 4px 12px;
      color: var(--accent);
      background: rgba(176, 38, 255, 0.05);
      border: 1px solid rgba(176, 38, 255, 0.3);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
    }

    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
      margin: 24px 0;
    }

    .data-cell {
      padding: 16px;
      background: var(--card-bg);
      border: 1px solid rgba(176, 38, 255, 0.1);
      transition: border-color 0.2s;
    }

    .data-cell:hover { border-color: rgba(176, 38, 255, 0.3); }

    .data-cell-label {
      margin-bottom: 6px;
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .data-cell-value {
      color: var(--text-main);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.98rem;
      line-height: 1.45;
    }

    .media-slot {
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(176, 38, 255, 0.08), rgba(8, 4, 14, 0.94)),
        repeating-linear-gradient(45deg, transparent 0 12px, rgba(176, 38, 255, 0.025) 12px 13px);
      border: 1px solid rgba(176, 38, 255, 0.25);
    }

    .main-media {
      aspect-ratio: 16 / 8;
      margin: 0 0 34px;
    }

    .media-slot img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .media-fallback {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      padding: 24px;
      text-align: center;
    }

    .media-slot.is-empty .media-fallback { display: flex; }

    .media-fallback span {
      color: var(--accent);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.16em;
    }

    .media-fallback small {
      max-width: 100%;
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.57rem;
      overflow-wrap: anywhere;
    }

    .media-slot figcaption {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      padding: 18px 14px 9px;
      color: rgba(255, 255, 255, 0.72);
      background: linear-gradient(transparent, rgba(5, 2, 8, 0.88));
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.57rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .media-slot.is-empty figcaption { display: none; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .gallery-grid .media-slot { aspect-ratio: 4 / 3; }

    .article-nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid rgba(176, 38, 255, 0.1);
    }

    .article-nav button {
      padding: 8px 16px;
      color: var(--text-muted);
      background: transparent;
      border: 1px solid rgba(176, 38, 255, 0.15);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
    }

    .article-nav button:hover {
      color: var(--accent);
      border-color: rgba(176, 38, 255, 0.4);
    }

    .search-status {
      min-height: 20px;
      margin-top: 12px;
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
    }

    @media (max-width: 900px) {
      :root { --sidebar-w: 220px; }
      .wb-main { padding: 40px 32px 80px; }
    }

    @media (max-width: 700px) {
      .top-nav { padding: 0 18px; }
      .nav-sep, .nav-title-wk, .nav-search { display: none; }
      .wb-sidebar { display: none; }
      .wb-main { width: 100%; margin-left: 0; padding: 32px 20px 80px; }
      .wb-hero { margin-bottom: 48px; }
      .mobile-page-nav { display: block; }
      .gallery-grid { grid-template-columns: 1fr; }
      .main-media { aspect-ratio: 4 / 3; }
      .article-nav button { max-width: 48%; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>

  <nav class="top-nav">
    <div class="top-nav-left">
      <a href="index.html" class="nav-back">← BROKEN STREET</a>
      <div class="nav-sep"></div>
      <span class="nav-title-wk">WORLDBOOK</span>
    </div>
    <label class="nav-search">
      <span class="nav-search-icon">⌕</span>
      <input type="search" placeholder="BUSCAR NO WORLDBOOK..." id="wb-search-input" autocomplete="off">
    </label>
  </nav>

  <div class="wb-layout">
    <aside class="wb-sidebar" id="wb-sidebar" aria-label="Navegação do worldbook"></aside>

    <main class="wb-main">
      <header class="wb-hero">
        <p class="wb-hero-tag">WRDBK.001 · CLASSIFIED LVL 07</p>
        <h1 class="wb-hero-title">WORLDBOOK</h1>
        <p class="wb-hero-desc">O arquivo completo do mundo de Broken Street: uma Terra remodelada pela Cyber Energy, dividida entre cidades impossíveis, poderes fatais e a ameaça crescente de Apocalypse.</p>
        <select class="mobile-page-nav" id="mobile-page-nav" aria-label="Escolha uma página do worldbook"></select>
        <p class="search-status" id="search-status" aria-live="polite"></p>
      </header>

      <section id="articles-root"></section>
    </main>
  </div>

  <script>
    /*
      IMAGENS
      Cada página procura automaticamente:
      assets/worldbook/ID-DA-PAGINA/principal.jpg
      assets/worldbook/ID-DA-PAGINA/galeria-1.jpg
      assets/worldbook/ID-DA-PAGINA/galeria-2.jpg
      assets/worldbook/ID-DA-PAGINA/galeria-3.jpg
      Enquanto os arquivos não existirem, o site exibe espaços identificados.
    */

    const groups = [
      {
        name: 'INÍCIO',
        pages: ['visao-geral', 'cosmologia']
      },
      {
        name: 'AMBIENTES E LOCAIS',
        pages: [
          'geografia', 'synth-city', 'cyberwave', 'shining-desert',
          'pumpkin-grove', 'frostwood', 'crimson-plateau',
          'village-of-silence', 'sanctuary-of-eterion', 'purgatory',
          'dream-world'
        ]
      },
      {
        name: 'ENERGIA E PODER',
        pages: ['cyber-energy', 'patentes', 'limites']
      },
      {
        name: 'ECONOMIA E SOCIEDADE',
        pages: ['echocoins', 'governo-militares', 'estrutura-social', 'profissoes']
      },
      {
        name: 'ORGANIZAÇÕES',
        pages: ['broken-street', 'outras-organizacoes']
      },
      {
        name: 'MUNDO VIVO E CULTURA',
        pages: ['armas-tecnologia', 'fauna-flora', 'religiao', 'cultura-linguagem']
      },
      {
        name: 'HISTÓRIA E AMEAÇAS',
        pages: ['historia-eras', 'fragmentos', 'apocalypse']
      }
    ];

    const pages = [
      {
        id: 'visao-geral',
        title: 'O Mundo de Broken Street',
        category: 'Início',
        lead: 'Beleza cyberpunk e decadência natural ocupam o mesmo planeta, enquanto poder, resistência e destruição disputam o futuro.',
        body: `
          <h3>Um mundo de contrastes</h3>
          <p>Broken Street acontece em uma Terra transformada pelo impacto de um meteorito e pela chegada da Cyber Energy. A tecnologia alcançou níveis impossíveis, mas a desigualdade, a corrupção e a instabilidade da própria realidade cresceram junto com ela.</p>
          <div class="data-grid">
            <div class="data-cell"><p class="data-cell-label">Mundo</p><p class="data-cell-value">Beleza cyberpunk coexistindo com decadência natural.</p></div>
            <div class="data-cell"><p class="data-cell-label">Sociedade</p><p class="data-cell-value">Tecnologia avançada ao lado de pobreza absoluta.</p></div>
            <div class="data-cell"><p class="data-cell-label">Conflito</p><p class="data-cell-value">Salvação possível enfrentando uma queda aparentemente inevitável.</p></div>
            <div class="data-cell"><p class="data-cell-label">Poder</p><p class="data-cell-value">Autoridade concentrada contra uma resistência dispersa.</p></div>
          </div>
          <h3>Broken Street</h3>
          <p>A organização Broken Street atua nas sombras, investigando corrupção, expondo verdades perigosas, questionando o poder estabelecido e arriscando tudo pela mudança.</p>
          <div class="highlight-quote"><p>A ameaça de Apocalypse paira sobre cada cidade, organização e escolha.</p></div>
        `
      },
      {
        id: 'cosmologia',
        title: 'Cosmologia e Origem',
        category: 'Cosmologia',
        lead: 'O universo nasceu de uma explosão de possibilidades. Sua antítese despertou no mesmo instante.',
        body: `
          <h3>Criação e paradoxo primordial</h3>
          <p>Antes de tudo, não havia nada. O Big Bang não foi uma criação ordenada, mas um desapego violento que lançou matéria, energia e consciência na realidade. Ninguém sabe se ele foi um ato divino, acaso absoluto ou algo além da compreensão humana.</p>
          <p>No mesmo instante, sua antítese acordou: o Anti-Big Bang, manifestação primordial do caos, da rejeição cósmica e da negação pura. De sua energia iridescente nasceu Apocalypse, o Anjo Caído do Colapso.</p>
          <p>As próprias leis da realidade rejeitaram Apocalypse e o baniram para Dead Horizon, dimensão paralela onde tempo, matéria e alma não obedecem às regras do universo. Aprisionado, mas não derrotado, ele passou séculos preparando seu retorno.</p>
          <h3>Os Quatro Cavaleiros</h3>
          <p>Apocalypse pretende ressuscitar seus Quatro Cavaleiros, já reencarnados na Terra como manifestações de Peste, Guerra, Fome e Morte. Eles procuram os Cinco Fragmentos Primordiais, relíquias capazes de formar o Cristal da Convergência.</p>
          <p>Com o cristal, Apocalypse poderá construir um corpo físico e romper completamente as barreiras entre dimensões.</p>
          <h3>O meteorito maldito</h3>
          <p>Há cerca de 700 anos, um meteorito carregado por energia cósmica desconhecida atingiu a Terra. O impacto alterou sua estrutura molecular, o eixo gravitacional e a própria realidade.</p>
          <ul>
            <li>O meteorito trouxe a Cyber Energy, um eco de Dead Horizon.</li>
            <li>Metade da humanidade foi dizimada.</li>
            <li>Ecossistemas sofreram mutações drásticas.</li>
            <li>O velho mundo morreu e uma nova Terra nasceu.</li>
          </ul>
        `
      },
      {
        id: 'geografia',
        title: 'Geografia do Mundo Transformado',
        category: 'Ambientes e locais',
        lead: 'Continentes, biomas e leis naturais foram retorcidos pelo impacto da Cyber Energy. Nenhum mapa antigo ainda é confiável.',
        body: `
          <h3>Características globais</h3>

    const pageMap = new Map(pages.map(page => [page.id, page]));
    const orderedPages = groups.flatMap(group => group.pages).map(id => pageMap.get(id)).filter(Boolean);

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function mediaSlot(src, alt, label, main = false) {
      return `
        <figure class="media-slot ${main ? 'main-media' : ''}">
          <img src="${src}" alt="${escapeHtml(alt)}" loading="${main ? 'eager' : 'lazy'}"
            onerror="this.parentElement.classList.add('is-empty'); this.remove();">
          <div class="media-fallback">
            <span>${main ? 'IMAGEM PRINCIPAL DA PÁGINA' : 'IMAGEM DA GALERIA'}</span>
            <small>${src}</small>
          </div>
          <figcaption>${escapeHtml(label)}</figcaption>
        </figure>
      `;
    }

    function articleTemplate(page, index) {
      const assetRoot = `assets/worldbook/${page.id}`;
      const previous = orderedPages[index - 1];
      const next = orderedPages[index + 1];

      return `
        <article class="wb-article ${index === 0 ? 'visible' : ''}" id="article-${page.id}" data-search="${escapeHtml(`${page.title} ${page.category}`.toLowerCase())}">
          <div class="article-header">
            <p class="article-category">// ${escapeHtml(page.category)}</p>
            <h2 class="article-title">${escapeHtml(page.title)}</h2>
            <p class="article-lead">${escapeHtml(page.lead)}</p>
          </div>

          ${mediaSlot(`${assetRoot}/principal.jpg`, `Imagem principal de ${page.title}`, page.title, true)}

          <div class="article-body">${page.body}</div>

          <h3 class="gallery-heading">Galeria</h3>
          <div class="gallery-grid">
            ${mediaSlot(`${assetRoot}/galeria-1.jpg`, `${page.title}, galeria 1`, `${page.title} · registro 01`)}
            ${mediaSlot(`${assetRoot}/galeria-2.jpg`, `${page.title}, galeria 2`, `${page.title} · registro 02`)}
            ${mediaSlot(`${assetRoot}/galeria-3.jpg`, `${page.title}, galeria 3`, `${page.title} · registro 03`)}
          </div>

          <nav class="article-nav" aria-label="Navegação entre páginas">
            <button type="button" ${previous ? `data-go="${previous.id}"` : 'disabled'}>← ${previous ? escapeHtml(previous.title) : 'INÍCIO'}</button>
            <button type="button" ${next ? `data-go="${next.id}"` : 'disabled'}>${next ? escapeHtml(next.title) : 'FIM DO ARQUIVO'} →</button>
          </nav>
        </article>
      `;
    }

    function buildWorldbook() {
      const sidebar = document.getElementById('wb-sidebar');
      const mobileSelect = document.getElementById('mobile-page-nav');
      const articlesRoot = document.getElementById('articles-root');

      sidebar.innerHTML = groups.map(group => `
        <p class="sidebar-section-title">${escapeHtml(group.name)}</p>
        ${group.pages.map(id => {
          const page = pageMap.get(id);
          return page ? `<button class="sidebar-link" type="button" data-article="${page.id}">${escapeHtml(page.title)}</button>` : '';
        }).join('')}
      `).join('');

      mobileSelect.innerHTML = groups.map(group => `
        <optgroup label="${escapeHtml(group.name)}">
          ${group.pages.map(id => {
            const page = pageMap.get(id);
            return page ? `<option value="${page.id}">${escapeHtml(page.title)}</option>` : '';
          }).join('')}
        </optgroup>
      `).join('');

      articlesRoot.innerHTML = orderedPages.map(articleTemplate).join('');

      sidebar.addEventListener('click', event => {
        const link = event.target.closest('[data-article]');
        if (link) showArticle(link.dataset.article);
      });

      mobileSelect.addEventListener('change', event => showArticle(event.target.value));

      articlesRoot.addEventListener('click', event => {
        const button = event.target.closest('[data-go]');
        if (button) showArticle(button.dataset.go);
      });

      const initialId = location.hash.slice(1);
      showArticle(pageMap.has(initialId) ? initialId : orderedPages[0].id, false);
    }

    function showArticle(id, updateHash = true) {
      const page = pageMap.get(id);
      if (!page) return;

      document.querySelectorAll('.wb-article').forEach(article => {
        article.classList.toggle('visible', article.id === `article-${id}`);
      });

      document.querySelectorAll('.sidebar-link').forEach(link => {
        const active = link.dataset.article === id;
        link.classList.toggle('active', active);
        if (active) link.scrollIntoView({ block: 'nearest' });
      });

      document.getElementById('mobile-page-nav').value = id;
      document.title = `${page.title} | Broken Street Worldbook`;

      if (updateHash) history.replaceState(null, '', `#${id}`);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('wb-search-input').addEventListener('input', event => {
      const query = event.target.value.toLowerCase().trim();
      const status = document.getElementById('search-status');

      if (!query) {
        status.textContent = '';
        return;
      }

      const found = orderedPages.find(page => {
        const searchText = `${page.title} ${page.category} ${page.lead} ${page.body.replace(/<[^>]+>/g, ' ')}`.toLowerCase();
        return searchText.includes(query);
      });

      if (found) {
        showArticle(found.id);
        status.textContent = `RESULTADO: ${found.title.toUpperCase()}`;
      } else {
        status.textContent = 'NENHUM REGISTRO ENCONTRADO';
      }
    });

    window.addEventListener('hashchange', () => {
      const id = location.hash.slice(1);
      if (pageMap.has(id)) showArticle(id, false);
    });

    buildWorldbook();
  </script>
